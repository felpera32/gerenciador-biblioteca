<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Livro</title>
    <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
          }

          .voltar {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 1.25rem;
            align-self: flex-start;
          }

          .voltar:hover { color: #374151; }

          h1 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 4px;
            align-self: flex-start;
          }

          .subtitulo {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 1.5rem;
            align-self: flex-start;
          }

          .mensagem {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 1.25rem;
          }

          .form-container {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
          }

          .form-group { margin-bottom: 1rem; }

          .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1rem;
          }

          label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 6px;
          }

          label .opcional {
            font-weight: 400;
            color: #9ca3af;
          }

          input, textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            color: #111827;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
          }

          textarea {
            min-height: 100px;
            resize: vertical;
          }

          input:focus, textarea:focus {
            outline: none;
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.3);
            background: #fff;
          }

          input::placeholder, textarea::placeholder { color: #9ca3af; }

          button {
            width: 100%;
            margin-top: 0.25rem;
            padding: 9px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
            background: #dcfce7;
            color: #15803d;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
          }

          button:hover { background: #bbf7d0; }
          button:active { transform: scale(0.98); }

          .link-voltar {
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
          }

          .link-voltar:hover { color: #374151; text-decoration: underline; }
    </style>


</head>
<body>
<h1>Cadastrar Livro</h1>
<div class="form-container">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>
    <form th:action="@{/livros/ui/salvar}" th:object="${livros}" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required />

        <label for="link">Link imagem:</label>
        <input type="text" id="link" th:field="*{link}" required />

        <label for="sinopse">Sinopse:</label>
        <textarea th:field="*{descricao}" id="sinopse" rows="4" required></textarea>

        <label for="autor">Autor:</label>
        <input type="text" id="autor" th:field="*{autor}" required />

        <label for="editora">Editora:</label>
        <input type="text" id="editora" th:field="*{editora}"/>


        <button type="submit">Cadastrar Livro</button>
    </form>

    <a th:href="@{/livros/ui/listar}">Lista de livros</a>

</div>
</body>
</html>
