<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Livro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .mensagem {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            margin-top: 15px;
            font-size: 14px;
        }

        /* 🔥 PADRÃO ÚNICO PRA INPUT + TEXTAREA */
        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            transition: 0.2s;
        }

        /* textarea específico */
        textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* FOCO (agora vale pros dois) */
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        /* placeholder consistente */
        input::placeholder,
        textarea::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        button:active {
            transform: scale(0.97);
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #3b82f6;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }



    </style>
</head>
<body>
<h1>Cadastrar Livro</h1>
<div class="form-container">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>
    <form th:action="@{/livros/ui/salvar}" th:object="${livros}" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required />

        <label for="link">Link imagem:</label>
        <input type="text" id="link" th:field="*{link}" required />

        <label for="sinopse">Sinopse:</label>
        <textarea th:field="*{descricao}" id="sinopse" rows="4" required></textarea>

        <label for="autor">Autor:</label>
        <input type="text" id="autor" th:field="*{autor}" required />

        <label for="editora">Editora:</label>
        <input type="text" id="editora" th:field="*{editora}" required />


        <button type="submit">Cadastrar Livro</button>
    </form>

    <a th:href="@{/livros/ui/listar}">Lista de livros</a>

</div>
</body>
</html>
