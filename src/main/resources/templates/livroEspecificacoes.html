<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Informações do livro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: 'Segoe UI', sans-serif;
          background: #f8f9fa;
          color: #1a1a1a;
          padding: 2rem;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        h1 {
          font-size: 22px;
          font-weight: 500;
          margin-bottom: 1.5rem;
          color: #111827;
        }

        .main-container {
          width: 100%;
          max-width: 600px;
          background: #fff;
          border: 1px solid #e5e7eb;
          border-radius: 12px;
          padding: 1.75rem;
        }

        .main-container img {
          display: block;
          margin: 0 auto 1.25rem;
          border-radius: 8px;
          object-fit: cover;
          width: 120px;
          height: 160px;
          border: 1px solid #e5e7eb;
        }

        .main-container h2 {
          text-align: center;
          font-size: 18px;
          font-weight: 500;
          color: #111827;
          margin-bottom: 1rem;
        }

        .main-container p {
          font-size: 14px;
          color: #374151;
          margin: 8px 0;
          padding: 8px 12px;
          background: #f9fafb;
          border-radius: 6px;
          border: 1px solid #f3f4f6;
          line-height: 1.5;
        }

        .main-container p strong {
          color: #6b7280;
          font-weight: 500;
          font-size: 12px;
          text-transform: uppercase;
          letter-spacing: 0.03em;
          margin-right: 6px;
        }

        .main-container span {
          font-size: 14px;
          color: #374151;
          line-height: 1.7;
          display: block;
          margin-top: 8px;
        }

        table {
          width: 100%;
          margin-top: 1.25rem;
          border-collapse: collapse;
          background: #f9fafb;
          border-radius: 8px;
          overflow: hidden;
          border: 1px solid #e5e7eb;
        }

        thead {
          background: #f3f4f6;
        }

        thead th {
          padding: 10px 14px;
          text-align: left;
          font-size: 12px;
          font-weight: 500;
          color: #6b7280;
          text-transform: uppercase;
          letter-spacing: 0.03em;
        }

        tbody tr {
          border-bottom: 1px solid #e5e7eb;
          transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: #f3f4f6; }

        td {
          padding: 10px 14px;
          font-size: 14px;
          color: #111827;
        }

        .btn {
          display: inline-flex;
          align-items: center;
          gap: 5px;
          margin: 1.25rem auto 0;
          padding: 7px 14px;
          border-radius: 8px;
          font-size: 13px;
          font-weight: 500;
          text-decoration: none;
          cursor: pointer;
        }

        .btn.voltar {
          color: #6b7280;
          border: none;
          background: none;
        }

        .btn.voltar:hover {
          color: #374151;
          text-decoration: underline;
        }
    </style>
</head>
<body>
<h1>Informações do livro</h1>
<div class="main-container">
    <img th:src="${livro.link}" width="100" height="100">
    <h2 th:text="${livro.nome}"></h2>
    <p><strong>Disponibilidade: </strong> <span th:text="${livro.disponivel ? 'Disponivel' : 'Indisponivel'}"></span></p>
    <p><strong>Data de Emprestimo: </strong> <span th:text="${livro.dataEmprestimo}"></span></p>
    <p><strong>Data de Devolução: </strong> <span th:text="${livro.dataDevolucao}"></span></p>
    <p><strong>Sinopse:</strong></p>
    <span th:text="${livro.descricao}"></span>
</div>
<a class="btn voltar" href="/livros/ui/listar">Voltar para a lista de livros</a>

</body>
</html>
