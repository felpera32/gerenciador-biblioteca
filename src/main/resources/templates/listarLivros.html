<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabela de Livros</title>
    <style>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            padding: 2rem;
          }

          h1 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 4px;
          }

          .subtitulo {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 1.5rem;
          }

          .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
          }

          .btn.criar {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
          }

          .btn.criar:hover { background: #bbf7d0; }

          table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            font-size: 14px;
          }

          thead tr { border-bottom: 1px solid #e5e7eb; }

          thead th {
            padding: 10px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
          }

          tbody tr { border-bottom: 1px solid #f3f4f6; }
          tbody tr:last-child { border-bottom: none; }
          tbody tr:hover { background: #f9fafb; }

          td { padding: 12px 16px; color: #111827; }

          .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
          }

          .badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
          }

          .badge.disponivel  { background: #dcfce7; color: #15803d; }
          .badge.indisponivel { background: #fee2e2; color: #b91c1c; }

          .acoes { display: flex; gap: 6px; }

          .btn {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid transparent;
            white-space: nowrap;
          }

          .btn.edit   { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
          .btn.view   { background: #f3f4f6; color: #374151; border-color: #e5e7eb; }
          .btn.delete { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }

          .btn.edit:hover   { background: #bfdbfe; }
          .btn.view:hover   { background: #e5e7eb; }
          .btn.delete:hover { background: #fecaca; }

          .rodape {
            margin-top: 10px;
            font-size: 12px;
            color: #9ca3af;
          }
    </style>

    </style>
</head>
<body>
<h1>Lista de Livros</h1>
<a class="btn criar" th:href="@{/livros/ui/adicionar}">Adicionar livro</a>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Disponibilidade</th>
        <th>Editora</th>
        <th>Autor</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each = "livros: ${livros}">
        <td th:text="${livros.id}"></td>
        <td th:text="${livros.nome}"></td>
        <td>
          <span th:class="${livros.disponivel ? 'badge disponivel' : 'badge indisponivel'}"
                th:text="${livros.disponivel ? 'Disponível' : 'Indisponível'}">
          </span>
        </td>
        <td th:text="${livros.editora}"></td>
        <td th:text="${livros.autor}"></td>

        <td class="acoes">
            <a class="btn edit" th:href="@{/livros/ui/editar/{id}(id=${livros.id})}">Editar</a>
            <a class="btn view" th:href="@{/livros/ui/listar/{id}(id=${livros.id})}">Ver detalhes</a>
            <a class="btn delete" th:href="@{/livros/ui/deletar/{id}(id=${livros.id})}">Deletar</a>
        </td>
    </tr>

    </tbody>
</table>




</body>
</html>
