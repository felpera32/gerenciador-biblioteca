<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabela de Livros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 50px auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }



        thead th {
            padding: 15px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5f5;
        }

        /* LINHAS */
        tbody tr {
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #273449;
        }

        /* CÉLULAS */
        td {
            padding: 14px;
            font-size: 14px;
        }

        .acoes {
            display: flex;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn.create {
            background: #22c55e;
            color: white;
        }

        .btn.create:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        .btn.edit {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .btn.edit:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .btn.delete {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .btn.delete:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .btn.view {
        background: rgba(168, 85, 247, 0.15);
        color: #a855f7;
        border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .btn.view:hover {
            background: #a855f7;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
        }






    .btn.criar {
        display: block;
        width: fit-content;
        margin: 30px;
        padding: 12px 18px;
        border-radius: 10px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.25s ease;
        box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
    }

    .btn.criar:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 20px rgba(34, 197, 94, 0.5);
    }

    .btn.criar:active {
        transform: scale(0.96);
    }












        .btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {

            table, thead, tbody, tr, td {
                display: block;
                width: 100%;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                background: #1e293b;
                border-radius: 8px;
                padding: 10px;
            }

            td {
                padding: 10px;
                text-align: right;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                color: #94a3b8;
                font-weight: bold;
            }

            .acoes {
                justify-content: flex-end;
            }
        }



    </style>
</head>
<body>
<h1>Lista de Livros</h1>
<a class="btn criar" th:href="@{/livros/ui/adicionar}">Adicionar livro</a>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Disponibilidade</th>
        <th>Editora</th>
        <th>Autor</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each = "livros: ${livros}">
        <td th:text="${livros.id}"></td>
        <td th:text="${livros.nome}"></td>
        <td th:text="${livros.disponivel}"></td>
        <td th:text="${livros.editora}"></td>
        <td th:text="${livros.autor}"></td>

        <td class="acoes">
            <a class="btn view" th:href="@{/livros/ui/listar/{id}(id=${livros.id})}">Ver detalhes</a>
            <a class="btn delete" th:href="@{/livros/ui/deletar/{id}(id=${livros.id})}">Deletar</a>
        </td>
    </tr>

    </tbody>
</table>




</body>
</html>
